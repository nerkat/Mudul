jobs:
  build_test:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      PNPM_HOME: ~/.pnpm
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      # 1) Install Node (no cache here)
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2) Enable pnpm (Corepack) BEFORE any caching
      - name: Enable pnpm + set store
        run: |
          corepack enable
          pnpm --version
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set prefer-offline true

      # 3) Cache the pnpm store
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-
            ${{ runner.os }}-

      # 4) Install / Build / Test
      - name: Install
        run: pnpm i --frozen-lockfile --prefer-offline

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test -- --reporter=dot
