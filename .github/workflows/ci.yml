name: ci

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build_test:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      PNPM_HOME: ~/.pnpm
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm + set store
        run: |
          corepack enable
          pnpm --version
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set prefer-offline true

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref }}-
            ${{ runner.os }}-

      - name: Install
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: echo "No tests defined, skipping"
